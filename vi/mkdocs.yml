# Project information
site_name: Hello Algo (Vietnamese)
site_description: "Hướng dẫn cấu trúc dữ liệu và thuật toán với hình minh họa động và mã nguồn có thể chạy được"
docs_dir: docs
site_dir: site

# Repository
edit_uri: tree/main/vi/docs

# Configuration
theme:
  name: material
  language: vi
  font:
    text: Inter
  palette:
    - scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/theme-light-dark
        name: Chế độ tối
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/theme-light-dark
        name: Chế độ sáng

extra:
  status:
    new: Vừa Thêm

# Page tree
